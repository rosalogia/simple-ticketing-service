name: Android CD

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
  workflow_dispatch:

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties', 'mobile/android/**/*.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install JS dependencies
        run: npm ci --legacy-peer-deps

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK
        working-directory: mobile/android
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }} -PversionName=1.${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Distribute to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npx firebase-tools appdistribution:distribute \
            android/app/build/outputs/apk/release/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --groups "beta-testers" \
            2>&1 || echo "::warning::Firebase distribution failed — APK artifact is still available"
          rm -f /tmp/firebase-sa.json

      - name: Create failure ticket
        if: failure()
        uses: ./.github/actions/create-failure-ticket
        with:
          title: "Android CD failed on main"
          description: |
            **Android CD failure on main**

            **Commit:** `${{ github.sha }}`
            **Author:** ${{ github.actor }}
            **Message:** ${{ github.event.head_commit.message }}
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The Android build or Firebase distribution step failed. Check the workflow logs for details.
          priority: SEV3
          api_key: ${{ secrets.STS_API_KEY }}
          base_url: ${{ vars.STS_BASE_URL }}
          queue_id: ${{ vars.STS_DEPLOY_QUEUE_ID }}
          assignee_id: ${{ vars.STS_DEPLOY_ASSIGNEE_ID }}
