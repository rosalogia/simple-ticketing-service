name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sts
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests
        run: uv run pytest --tb=short -q
        env:
          DEBUG: "true"
          DATABASE_URL: "postgresql://sts:test@localhost:5432/sts_test"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sts
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sts_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: uv sync --extra postgres
        working-directory: backend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          DEBUG: "true"
          DATABASE_URL: "postgresql://sts:test@localhost:5432/sts_e2e"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  alert-on-failure:
    if: ${{ failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [backend, frontend, e2e, mobile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build failure description
        id: failure_info
        env:
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"

          FAILED_JOBS=""
          for JOB in backend frontend e2e mobile; do
            RESULT_VAR="${JOB^^}_RESULT"
            RESULT="${!RESULT_VAR}"
            if [ "$RESULT" = "failure" ]; then
              FAILED_JOBS="${FAILED_JOBS}\n- ${JOB}"
            fi
          done

          TITLE="CI failed on main: ${SHORT_SHA}"

          BODY=$(jq -rn \
            --arg sha "$COMMIT_SHA" \
            --arg actor "$ACTOR" \
            --arg msg "$COMMIT_MSG" \
            --arg run "$RUN_URL" \
            --arg failed "$FAILED_JOBS" \
            '"**CI failure on main**\n\n**Commit:** `" + $sha + "`\n**Author:** " + $actor + "\n**Message:** " + $msg + "\n**Run:** " + $run + "\n\n**Failed jobs:**" + $failed')

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          {
            echo "body<<TICKET_BODY_EOF"
            echo "$BODY"
            echo "TICKET_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create failure ticket
        uses: ./.github/actions/create-failure-ticket
        with:
          title: ${{ steps.failure_info.outputs.title }}
          description: ${{ steps.failure_info.outputs.body }}
          priority: SEV3
          api_key: ${{ secrets.STS_API_KEY }}
          base_url: ${{ vars.STS_BASE_URL }}
          queue_id: ${{ vars.STS_DEPLOY_QUEUE_ID }}
          assignee_id: ${{ vars.STS_DEPLOY_ASSIGNEE_ID }}
